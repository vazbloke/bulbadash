<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Showerball - P2P Rollback Netcode Prototype</title>
    <script src="https://cdn.jsdelivr.net/npm/phaser@3.55.2/dist/phaser.min.js"></script>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { margin: 0; overflow: hidden; background-color: #1a202c; color: white; font-family: sans-serif; }
        canvas { display: block; margin: 0 auto; box-shadow: 0 0 20px rgba(0,0,0,0.5); border-radius: 8px;}
        #ui-layer { position: absolute; top: 0; left: 0; width: 100%; height: 100%; display: flex; flex-direction: column; align-items: center; justify-content: center; background: rgba(26, 32, 44, 0.9); z-index: 10; }
        .hidden { display: none !important; }
    </style>
</head>
<body>

    <!-- Context Warning Banner -->
    <div id="insecure-warning" class="hidden text-white text-center p-2 text-sm w-full absolute top-0 z-50"></div>

    <!-- UI Overlay for P2P Connection -->
    <div id="ui-layer">
        <h1 class="text-5xl font-bold mb-8 text-blue-400 tracking-wider">SHOWERBALL</h1>
        <p class="mb-8 text-gray-300">P2P Rollback Netcode Prototype</p>

        <div class="flex gap-8">
            <!-- Host Panel -->
            <div class="bg-gray-800 p-6 rounded-lg shadow-lg flex flex-col items-center w-80">
                <h2 class="text-2xl font-semibold mb-4 text-green-400">Host Game</h2>
                <button id="btn-host" class="bg-green-600 hover:bg-green-500 text-white font-bold py-2 px-6 rounded transition w-full">Create Room</button>
                <div id="host-info" class="mt-4 hidden w-full text-center">
                    <p class="text-sm text-gray-400 mb-1">Your Room ID:</p>
                    <input type="text" id="host-id-display" readonly class="w-full bg-gray-900 text-center text-green-300 p-2 rounded cursor-copy font-mono text-sm" onclick="this.select()">
                    <p id="host-status" class="text-xs text-gray-500 mt-2">Waiting for client to join...</p>
                    <p id="host-ice-state" class="text-xs text-yellow-400 mt-1 font-mono"></p>
                </div>
            </div>

            <!-- Client Panel -->
            <div class="bg-gray-800 p-6 rounded-lg shadow-lg flex flex-col items-center w-80">
                <h2 class="text-2xl font-semibold mb-4 text-blue-400">Join Game</h2>
                <input type="text" id="join-id-input" placeholder="Paste Room ID here" class="w-full bg-gray-900 text-center text-blue-300 p-2 rounded font-mono mb-4 border border-gray-700">
                <button id="btn-join" class="bg-blue-600 hover:bg-blue-500 text-white font-bold py-2 px-6 rounded transition w-full">Connect</button>
                <div id="join-info" class="mt-4 hidden text-sm text-yellow-400">Connecting...</div>
                <p id="client-ice-state" class="text-xs text-yellow-400 mt-1 font-mono"></p>
            </div>
        </div>
        
        <div class="mt-8 text-gray-400 text-sm max-w-xl text-center">
            <strong>Controls:</strong> Arrow Keys / Gamepad D-PAD / Joysticks to Move/Jump. 'SHIFT' or 'A' to Omni-Dash.<br>
            Dash into the other player to score a hit!
        </div>
    </div>

    <!-- Game Container -->
    <div id="game-container" class="mt-8 relative hidden w-full flex justify-center">
        <!-- Scoreboard -->
        <div class="absolute top-4 left-1/2 transform -translate-x-1/2 flex gap-12 z-10 text-2xl font-bold bg-gray-800 px-6 py-2 rounded-full border-2 border-gray-700 shadow-lg">
            <div class="text-green-400">P1 (Host): <span id="score-p1">0</span></div>
            <div class="text-blue-400">P2 (Client): <span id="score-p2">0</span></div>
        </div>
    </div>

<script>
/**
 * ==========================================
 * GAME CONSTANTS & PHYSICS SETTINGS
 * ==========================================
 */
const GAME_WIDTH = 800;
const GAME_HEIGHT = 600;
const TICK_RATE = 60; 
const TICK_MS = 1000 / TICK_RATE; 
const NET_TICK_MODIFIER = 3; 

const PLAYER_SIZE = 32;
const GRAVITY = 0.8;
const JUMP_VELOCITY = -14;
const MOVE_SPEED = 6;
const DASH_SPEED = 18;
const DASH_COOLDOWN_TICKS = 90; 
const DASH_DURATION_TICKS = 10;

const PLATFORMS = [
    { x: 0, y: 550, w: 800, h: 50 },    
    { x: 150, y: 400, w: 150, h: 20 },  
    { x: 500, y: 400, w: 150, h: 20 },  
    { x: 325, y: 250, w: 150, h: 20 }   
];

/**
 * ==========================================
 * GLOBAL NETWORK & STATE VARIABLES
 * ==========================================
 */
let isHost = false;
let peer = null;
let conn = null;
let bc = null; // BroadcastChannel for local bypass

let currentTick = 0; 
let lastProcessedClientTick = 0; 

let hostState = createInitialState(100, 100);
let clientState = createInitialState(650, 100);

let pendingInputs = []; 
let clientInputBuffer = []; 

// Keyboard Input State
let keys = {};
let prevJumpState = false;
let prevDashState = false;

// Check if we are running locally to bypass WebRTC bugs
const isLocalMachine = window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1';
const warningBanner = document.getElementById('insecure-warning');

if (isLocalMachine) {
    warningBanner.innerHTML = "<strong>Local Tab Mode Active:</strong> WebRTC bypassed for loopback testing. Use Room ID <strong>LOCAL</strong> to play instantly. <em>(Note: Both tabs must be regular windows. Do not mix Incognito and Standard tabs!)</em>";
    warningBanner.classList.add('bg-blue-600');
    warningBanner.classList.remove('hidden');
} else if (window.location.protocol === 'http:') {
    warningBanner.innerHTML = "<strong>Warning:</strong> HTTP LAN connections block WebRTC on Android/Mac. Please host via ngrok (HTTPS) for cross-device play.";
    warningBanner.classList.add('bg-red-600');
    warningBanner.classList.remove('hidden');
}

// Explicit standard STUN servers
const peerConfig = {
    debug: 2,
    config: {
        iceServers: [
            { urls: 'stun:stun.l.google.com:19302' },
            { urls: 'stun:stun1.l.google.com:19302' }
        ]
    }
};

function createInitialState(startX, startY) {
    return {
        x: startX,
        y: startY,
        vx: 0,
        vy: 0,
        dashCooldown: 0,
        dashActiveTimer: 0,
        hits: 0
    };
}

/**
 * ==========================================
 * NETWORKING SETUP (WEBRTC + LOCAL BYPASS)
 * ==========================================
 */
document.getElementById('btn-host').addEventListener('click', () => {
    isHost = true;
    
    // --- LOCAL SAME-MACHINE BYPASS ---
    if (isLocalMachine) {
        document.getElementById('btn-host').classList.add('hidden');
        document.getElementById('host-info').classList.remove('hidden');
        document.getElementById('host-id-display').value = "LOCAL";
        document.getElementById('host-status').innerText = "Waiting for local tab to join...";
        
        bc = new BroadcastChannel('showerball_local_room');
        bc.onmessage = (e) => {
            if (e.data.type === 'join_req') {
                // Confirm to the client that the host is ready
                bc.postMessage({ type: 'join_ack' }); 
                
                document.getElementById('host-status').innerText = "Local client joined! Starting...";
                conn = { open: true, send: (d) => bc.postMessage(d) }; // Mock connection
                
                if (!document.getElementById('ui-layer').classList.contains('hidden')) {
                    document.getElementById('ui-layer').classList.add('hidden');
                    document.getElementById('game-container').classList.remove('hidden');
                    if (!phaserGame) startGame();
                }
            } else if (e.data.type === 'input') {
                clientInputBuffer.push(e.data.input);
            }
        };
        return;
    }
    
    // --- NORMAL WEBRTC ---
    peer = new Peer(peerConfig);
    peer.on('open', (id) => {
        document.getElementById('btn-host').classList.add('hidden');
        document.getElementById('host-info').classList.remove('hidden');
        document.getElementById('host-id-display').value = id;
    });

    peer.on('connection', (connection) => {
        document.getElementById('host-status').innerText = "Client joining... Negotiating DataChannel...";
        conn = connection;
        setupConnectionEvents(conn);
    });

    peer.on('error', (err) => {
        document.getElementById('host-status').innerText = "Network Error: " + err.type;
        document.getElementById('host-status').classList.add('text-red-400');
    });
});

document.getElementById('btn-join').addEventListener('click', () => {
    isHost = false;
    const hostId = document.getElementById('join-id-input').value.trim();
    if(!hostId) return;

    // --- LOCAL SAME-MACHINE BYPASS ---
    if (isLocalMachine && hostId === "LOCAL") {
        document.getElementById('join-info').classList.remove('hidden');
        document.getElementById('join-info').innerText = "Looking for Host tab...";
        
        bc = new BroadcastChannel('showerball_local_room');
        let hasJoined = false;

        bc.onmessage = (e) => {
            if (e.data.type === 'join_ack' && !hasJoined) {
                hasJoined = true;
                document.getElementById('join-info').innerText = "Host found! Starting game...";
                conn = { open: true, send: (d) => bc.postMessage(d) }; // Mock connection
                
                document.getElementById('ui-layer').classList.add('hidden');
                document.getElementById('game-container').classList.remove('hidden');
                if (!phaserGame) startGame();
            } else if (e.data.type === 'state') {
                handleServerReconciliation(e.data);
            }
        };
        
        // Actively ping the host tab until it acknowledges
        let pingInterval = setInterval(() => {
            if (hasJoined) {
                clearInterval(pingInterval);
            } else {
                bc.postMessage({ type: 'join_req' });
            }
        }, 250);
        
        return;
    }

    // --- NORMAL WEBRTC ---
    document.getElementById('join-info').classList.remove('hidden');
    document.getElementById('join-info').innerText = "Initializing Peer...";
    
    peer = new Peer(peerConfig);
    peer.on('open', () => {
        document.getElementById('join-info').innerText = "Negotiating WebRTC...";
        conn = peer.connect(hostId); 
        setupConnectionEvents(conn);
    });

    peer.on('error', (err) => {
        document.getElementById('join-info').innerText = "Network Error: " + err.type;
        document.getElementById('join-info').classList.replace('text-yellow-400', 'text-red-400');
    });
});

function setupConnectionEvents(connection) {
    let diagInterval = setInterval(() => {
        if (connection.peerConnection) {
            const state = connection.peerConnection.iceConnectionState;
            const uiElem = isHost ? document.getElementById('host-ice-state') : document.getElementById('client-ice-state');
            uiElem.innerText = `ICE State: ${state}`;
            
            if (state === 'failed' || state === 'disconnected') {
                uiElem.classList.replace('text-yellow-400', 'text-red-400');
            } else if (state === 'connected' || state === 'completed') {
                uiElem.classList.replace('text-yellow-400', 'text-green-400');
            }
        }
    }, 500);

    let iceTimeout = setTimeout(() => {
        if (!connection.open) {
            clearInterval(diagInterval);
            const msg = "Timeout. Check ICE State below.";
            if (isHost) {
                document.getElementById('host-status').innerText = msg;
                document.getElementById('host-status').classList.replace('text-gray-500', 'text-red-400');
            } else {
                document.getElementById('join-info').innerText = msg;
                document.getElementById('join-info').classList.replace('text-yellow-400', 'text-red-400');
            }
        }
    }, 15000);

    const onOpen = () => {
        clearTimeout(iceTimeout);
        clearInterval(diagInterval);
        document.getElementById('ui-layer').classList.add('hidden');
        document.getElementById('game-container').classList.remove('hidden');
        if (!phaserGame) startGame(); 
    };

    if (connection.open) {
        onOpen();
    } else {
        connection.on('open', onOpen);
    }

    connection.on('data', (data) => {
        if (isHost && data.type === 'input') {
            clientInputBuffer.push(data.input);
        } 
        else if (!isHost && data.type === 'state') {
            handleServerReconciliation(data);
        }
    });

    connection.on('error', (err) => {
        clearTimeout(iceTimeout);
        alert("Connection errored out: " + err);
    });
}

/**
 * ==========================================
 * PURE PHYSICS ENGINE
 * ==========================================
 */
function stepPhysics(state, input) {
    let nextState = { ...state };

    if (nextState.dashCooldown > 0) nextState.dashCooldown--;
    if (nextState.dashActiveTimer > 0) nextState.dashActiveTimer--;

    if (input.dash && nextState.dashCooldown === 0) {
        nextState.dashActiveTimer = DASH_DURATION_TICKS;
        nextState.dashCooldown = DASH_COOLDOWN_TICKS;
        
        let dx = 0; let dy = 0;
        if (input.left) dx = -1; else if (input.right) dx = 1;
        if (input.up) dy = -1; else if (input.down) dy = 1;
        if (dx === 0 && dy === 0) dx = 1; 

        let length = Math.sqrt(dx*dx + dy*dy);
        nextState.vx = (dx / length) * DASH_SPEED;
        nextState.vy = (dy / length) * DASH_SPEED;
    }

    if (nextState.dashActiveTimer === 0) {
        if (input.left) nextState.vx = -MOVE_SPEED;
        else if (input.right) nextState.vx = MOVE_SPEED;
        else nextState.vx = 0; 

        nextState.vy += GRAVITY;
    }

    let isGrounded = false;

    nextState.x += nextState.vx;
    for (let plat of PLATFORMS) {
        if (checkAABB(nextState.x, nextState.y, PLAYER_SIZE, PLAYER_SIZE, plat.x, plat.y, plat.w, plat.h)) {
            if (nextState.vx > 0) nextState.x = plat.x - PLAYER_SIZE;
            else if (nextState.vx < 0) nextState.x = plat.x + plat.w;
            nextState.vx = 0;
        }
    }

    nextState.y += nextState.vy;
    for (let plat of PLATFORMS) {
        if (checkAABB(nextState.x, nextState.y, PLAYER_SIZE, PLAYER_SIZE, plat.x, plat.y, plat.w, plat.h)) {
            if (nextState.vy > 0) { 
                nextState.y = plat.y - PLAYER_SIZE;
                isGrounded = true;
            } else if (nextState.vy < 0) { 
                nextState.y = plat.y + plat.h;
            }
            nextState.vy = 0;
        }
    }

    if (input.jump && isGrounded && nextState.dashActiveTimer === 0) {
        nextState.vy = JUMP_VELOCITY;
    }

    if (nextState.x < 0) nextState.x = 0;
    if (nextState.x > GAME_WIDTH - PLAYER_SIZE) nextState.x = GAME_WIDTH - PLAYER_SIZE;
    if (nextState.y < 0) nextState.y = 0;
    if (nextState.y > GAME_HEIGHT) {
        nextState.x = 400;
        nextState.y = 100;
        nextState.vy = 0;
    }

    return nextState;
}

function checkAABB(x1, y1, w1, h1, x2, y2, w2, h2) {
    return x1 < x2 + w2 && x1 + w1 > x2 && y1 < y2 + h2 && y1 + h1 > y2;
}


/**
 * ==========================================
 * SERVER RECONCILIATION & ROLLBACK
 * ==========================================
 */
function handleServerReconciliation(data) {
    hostState = data.hostState;
    pendingInputs = pendingInputs.filter(input => input.tick > data.ackTick);
    clientState = data.clientState;
    updateScores(data.hostState.hits, data.clientState.hits);

    for (let i = 0; i < pendingInputs.length; i++) {
        clientState = stepPhysics(clientState, pendingInputs[i]);
    }
}


/**
 * ==========================================
 * MAIN FIXED-TIMESTEP GAME LOOP
 * ==========================================
 */
function tick() {
    currentTick++;

    let padState = { left: false, right: false, up: false, down: false, dash: false };
    if (phaserGame && phaserGame.input.gamepad && phaserGame.input.gamepad.total > 0) {
        let pad = phaserGame.input.gamepad.getPad(0);
        let axisH = pad.axes.length > 0 ? pad.axes[0].getValue() : 0;
        let axisV = pad.axes.length > 1 ? pad.axes[1].getValue() : 0;
        let axisRH = pad.axes.length > 2 ? pad.axes[2].getValue() : 0;
        let axisRV = pad.axes.length > 3 ? pad.axes[3].getValue() : 0;
        
        padState.left = pad.left || axisH < -0.5 || axisRH < -0.5;
        padState.right = pad.right || axisH > 0.5 || axisRH > 0.5;
        padState.up = pad.up || axisV < -0.5 || axisRV < -0.5;
        padState.down = pad.down || axisV > 0.5 || axisRV > 0.5;
        padState.dash = pad.A; 
    }

    let isUpPressed = keys.up.isDown || padState.up;
    let isDashPressed = keys.dash.isDown || padState.dash;

    let jumpJustPressed = isUpPressed && !prevJumpState;
    let dashJustPressed = isDashPressed && !prevDashState;

    prevJumpState = isUpPressed;
    prevDashState = isDashPressed;

    const input = {
        tick: currentTick,
        left: keys.left.isDown || padState.left,
        right: keys.right.isDown || padState.right,
        up: keys.up.isDown || padState.up,
        down: keys.down.isDown || padState.down,
        jump: jumpJustPressed, 
        dash: dashJustPressed
    };

    if (isHost) {
        hostState = stepPhysics(hostState, input);

        let latestClientInput = null;
        while (clientInputBuffer.length > 0) {
            let nextInput = clientInputBuffer.shift();
            latestClientInput = nextInput;
            lastProcessedClientTick = nextInput.tick;
        }

        const cInputToProcess = latestClientInput || { tick: 0, left:false, right:false, up:false, down:false, jump:false, dash:false };
        clientState = stepPhysics(clientState, cInputToProcess);

        if (hostState.dashActiveTimer > 0 && checkAABB(hostState.x, hostState.y, PLAYER_SIZE, PLAYER_SIZE, clientState.x, clientState.y, PLAYER_SIZE, PLAYER_SIZE)) {
            hostState.hits++;
            clientState.x = 650; clientState.y = 100; 
            hostState.dashActiveTimer = 0; 
            updateScores(hostState.hits, clientState.hits);
        }
        if (clientState.dashActiveTimer > 0 && checkAABB(clientState.x, clientState.y, PLAYER_SIZE, PLAYER_SIZE, hostState.x, hostState.y, PLAYER_SIZE, PLAYER_SIZE)) {
            clientState.hits++;
            hostState.x = 100; hostState.y = 100; 
            clientState.dashActiveTimer = 0;
            updateScores(hostState.hits, clientState.hits);
        }

        if (currentTick % NET_TICK_MODIFIER === 0 && conn && conn.open) {
            conn.send({
                type: 'state',
                ackTick: lastProcessedClientTick,
                hostState: hostState,
                clientState: clientState
            });
        }

    } else {
        clientState = stepPhysics(clientState, input);
        pendingInputs.push(input);

        if (conn && conn.open) {
            conn.send({
                type: 'input',
                input: input
            });
        }
    }
}

function updateScores(p1Hits, p2Hits) {
    document.getElementById('score-p1').innerText = p1Hits;
    document.getElementById('score-p2').innerText = p2Hits;
}


/**
 * ==========================================
 * PHASER 3 RENDERING & INTEGRATION
 * ==========================================
 */
let phaserGame;
let spriteHost;
let spriteClient;
let dashIndicators = {};

function startGame() {
    const config = {
        type: Phaser.AUTO,
        width: GAME_WIDTH,
        height: GAME_HEIGHT,
        parent: 'game-container',
        backgroundColor: '#2d3748',
        input: {
            gamepad: true 
        },
        scene: {
            preload: preload,
            create: create,
            update: update
        }
    };
    phaserGame = new Phaser.Game(config);
}

function preload() {}

function create() {
    let graphics = this.add.graphics();
    graphics.fillStyle(0x4a5568, 1);
    for(let plat of PLATFORMS) {
        graphics.fillRect(plat.x, plat.y, plat.w, plat.h);
    }

    spriteHost = this.add.rectangle(hostState.x, hostState.y, PLAYER_SIZE, PLAYER_SIZE, 0x48bb78);
    spriteHost.setOrigin(0,0);
    spriteHost.setStrokeStyle(2, 0xffffff);

    spriteClient = this.add.rectangle(clientState.x, clientState.y, PLAYER_SIZE, PLAYER_SIZE, 0x4299e1);
    spriteClient.setOrigin(0,0);
    spriteClient.setStrokeStyle(2, 0xffffff);

    dashIndicators.host = this.add.rectangle(0, 0, PLAYER_SIZE, 4, 0x68d391).setOrigin(0,0);
    dashIndicators.client = this.add.rectangle(0, 0, PLAYER_SIZE, 4, 0x63b3ed).setOrigin(0,0);

    keys = {
        up: this.input.keyboard.addKey(Phaser.Input.Keyboard.KeyCodes.UP),
        down: this.input.keyboard.addKey(Phaser.Input.Keyboard.KeyCodes.DOWN),
        left: this.input.keyboard.addKey(Phaser.Input.Keyboard.KeyCodes.LEFT),
        right: this.input.keyboard.addKey(Phaser.Input.Keyboard.KeyCodes.RIGHT),
        dash: this.input.keyboard.addKey(Phaser.Input.Keyboard.KeyCodes.SHIFT)
    };
}

let accumulator = 0;

function update(time, delta) {
    accumulator += delta;

    while (accumulator >= TICK_MS) {
        tick(); 
        accumulator -= TICK_MS;
    }

    if (spriteHost && spriteClient) {
        spriteHost.x = hostState.x;
        spriteHost.y = hostState.y;
        
        spriteClient.x = clientState.x;
        spriteClient.y = clientState.y;

        spriteHost.fillColor = hostState.dashActiveTimer > 0 ? 0xffffff : 0x48bb78;
        spriteClient.fillColor = clientState.dashActiveTimer > 0 ? 0xffffff : 0x4299e1;

        dashIndicators.host.x = hostState.x;
        dashIndicators.host.y = hostState.y - 10;
        dashIndicators.host.width = PLAYER_SIZE * (1 - (hostState.dashCooldown / DASH_COOLDOWN_TICKS));

        dashIndicators.client.x = clientState.x;
        dashIndicators.client.y = clientState.y - 10;
        dashIndicators.client.width = PLAYER_SIZE * (1 - (clientState.dashCooldown / DASH_COOLDOWN_TICKS));
    }
}
</script>
</body>
</html>
